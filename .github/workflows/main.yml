name: Build Android App

on:
  push:
    branches:
      - main # Apnar main branch-er naam jodi 'master' hoy, tobe master likhben

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Jodi Flutter app hoy, tobe ei step-ti add korben (na hole bad dite paren)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          # Flutter hole: flutter pub get
          # React Native hole: npm install

      - name: Build APK
        run: |
          # Flutter hole: flutter build apk --release
          # Android/Gradle hole: ./gradlew assembleRelease

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk # Apnar build file jikhane generate hoy tar exact path
